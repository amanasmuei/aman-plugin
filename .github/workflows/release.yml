name: release

# Auto-creates a GitHub Release from the matching CHANGELOG section when a
# v* tag is pushed. aman-claude-code is a Claude Code marketplace plugin
# (not an npm package), so this workflow does NOT publish to npm — it only
# creates the Release entry so users can browse version history in the UI.
#
# Security posture:
# - Triggered ONLY by tag push. Secrets are never exposed to PR code.
# - All interpolations use the `env:` pattern so shell sees a variable
#   reference, never inlined attacker-controlled text.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write  # create GitHub Release

jobs:
  github-release:
    name: create GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Create release from CHANGELOG section
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${TAG#v}"
          # Extract the CHANGELOG section for this version. Sections start
          # with "## <version> — <date>".
          awk -v ver="## ${VERSION}" '
            $0 ~ ver {found=1; next}
            found && /^## [0-9]/ {exit}
            found {print}
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            printf 'Release %s. See CHANGELOG.md for details.\n' "$TAG" > /tmp/release-notes.md
          fi
          # Mark alpha / beta / rc tags as prereleases.
          PRERELEASE_FLAG=""
          case "$TAG" in
            *alpha*|*beta*|*rc*|*pre*) PRERELEASE_FLAG="--prerelease" ;;
          esac
          gh release create "$TAG" \
            --repo "$REPO" \
            --title "$TAG" \
            $PRERELEASE_FLAG \
            --notes-file /tmp/release-notes.md
